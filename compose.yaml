services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: microsonya/telegram-bot:local
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://microsonya:${POSTGRES_PASSWORD:-microsonya}@postgres:5432/microsonya}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_MODELS: ${LLM_MODELS:-nvidia/nemotron-3-nano-30b-a3b:free,openai/gpt-oss-20b:free,google/gemma-4-31b-it:free,google/gemma-4-26b-a4b-it:free,qwen/qwen3-next-80b-a3b-instruct:free,openrouter/free}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-microsonya}
      POSTGRES_USER: ${POSTGRES_USER:-microsonya}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-microsonya}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-microsonya} -d $${POSTGRES_DB:-microsonya}"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
