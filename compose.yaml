services:
  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: microsonya/telegram-bot:local
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://microsonya:microsonya@postgres:5432/microsonya}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://openrouter.ai/api/v1/}
      LLM_MODEL: ${LLM_MODEL:-qwen/qwen3-next-80b-a3b-instruct:free}
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: microsonya
      POSTGRES_USER: microsonya
      POSTGRES_PASSWORD: microsonya
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
